<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sans Raccourci</title>
<style>
:root{
  --bg:#ffffff; --surface:#ffffff; --surface-2:#f6f5f1;
  --text:#1c1c1a; --muted:#6b6a64; --faint:#94938c;
  --border:#e6e4dd; --accent:#3a5f8a; --maxw:760px;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#1a1a18; --surface:#232320; --surface-2:#2a2a26;
    --text:#ece9e1; --muted:#a3a199; --faint:#78766f; --border:#34342f; --accent:#8ab0da; }
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.65;-webkit-font-smoothing:antialiased}
.wrap{max-width:var(--maxw);margin:0 auto;padding:28px 20px 64px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.topbar{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:.5px solid var(--border);margin-bottom:28px}
.brand{font-weight:600;font-size:16px;color:var(--text)}
.nav{display:flex;gap:16px;font-size:14px}
.nav a{color:var(--muted)}
.nav a.active{color:var(--text);border-bottom:2px solid var(--border);padding-bottom:3px}
.eyebrow{font-size:12px;color:var(--faint);letter-spacing:.04em;margin:0 0 4px}
h1{font-size:24px;font-weight:600;margin:0 0 10px}
h2{font-size:18px;font-weight:600;margin:32px 0 12px}
.lede{font-size:15px;color:var(--muted);margin:0 0 28px}
p{margin:0 0 12px}
.chip{font-size:11px;background:var(--surface-2);color:var(--muted);padding:2px 9px;border-radius:20px;white-space:nowrap}
.chip-fait{background:rgba(58,95,138,.14);color:var(--accent)}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.card-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.card-head .name{font-weight:600;font-size:15px;color:var(--text)}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.col .k{font-size:11px;color:var(--faint);margin:0 0 3px}
.col .v{font-size:13px;color:var(--muted);margin:0 0 4px}
.src{font-size:12px}
table{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:8px}
td,th{text-align:left;padding:8px 10px;border-bottom:.5px solid var(--border);vertical-align:top}
th{font-size:12px;color:var(--faint);font-weight:500}
.foot{margin-top:28px;padding-top:14px;border-top:.5px solid var(--border);font-size:12px;color:var(--faint)}
.grid-links{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.linklist{list-style:none;padding:0;margin:0}
.linklist li{padding:8px 0;border-bottom:.5px solid var(--border);font-size:15px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.count{font-size:12px;color:var(--faint);margin:0 0 8px}
.prose p{font-size:14px;color:var(--muted)}
.prose h3{font-size:15px;margin:20px 0 6px}
@media(max-width:560px){.cols,.grid-links{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
var DATA = { themes: [], candidats: [] };

function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];});}
function srcLink(u){return u?'<a class="src" href="'+esc(u)+'">source</a>':'<span class="src" style="color:var(--faint)">source à ajouter</span>';}
function themeLabel(cle){var t=DATA.themes.find(function(x){return x.cle===cle;});return t?t.label:cle;}

function topbar(active){
  function a(key,label,href){return '<a class="'+(active===key?'active':'')+'" href="'+href+'">'+label+'</a>';}
  return '<div class="topbar"><a class="brand" href="#/">sans raccourci</a><nav class="nav">'+
    a('theme','par thème','#/theme/energie_climat')+a('candidat','par candidat','#/')+a('methode','méthode','#/methode')+'</nav></div>';
}
function foot(){return '<div class="foot">pas de commentaires, pas de likes, pas de compteurs. chaque ligne renvoie à sa source. versionné sur GitHub.</div>';}

function renderHome(){
  var themes=DATA.themes.map(function(t){return '<li><a href="#/theme/'+t.cle+'">'+esc(t.label)+'</a></li>';}).join('');
  var cands=DATA.candidats.map(function(c){return '<li><a href="#/candidat/'+esc(c.slug)+'">'+esc(c.nom)+'</a><span class="chip">'+(c.positions||[]).length+' / '+DATA.themes.length+' thèmes</span></li>';}).join('');
  return topbar('')+'<h1>Sans Raccourci</h1>'+
    '<p class="lede">Comprendre qui propose quoi, qui s\u0027est vraiment engagé sur quoi, et comment les médias le racontent. Tous les bords à égalité, chaque affirmation rattachée à sa source.</p>'+
    '<div class="grid-links"><div><h2>Par thème</h2><ul class="linklist">'+(themes||'<li>...</li>')+'</ul></div>'+
    '<div><h2>Par candidat</h2><p class="count">'+DATA.candidats.length+' candidat(s) pour l\u0027instant. La liste s\u0027allongera avec les fiches.</p><ul class="linklist">'+(cands||'<li>...</li>')+'</ul></div></div>'+
    '<p style="margin-top:28px"><a href="#/comprendre">comprendre les niveaux de mandat</a></p>'+foot();
}
function renderTheme(cle){
  var cards=DATA.candidats.map(function(c){
    var p=(c.positions||[]).find(function(x){return x.theme===cle;});
    var posTxt=p&&p.position?p.position.texte:'à documenter', posSrc=p&&p.position?p.position.source:'';
    var actTxt=p&&p.acte?p.acte.texte:'à documenter', actSrc=p&&p.acte?p.acte.source:'';
    return '<div class="card"><div class="card-head"><a class="name" href="#/candidat/'+esc(c.slug)+'">'+esc(c.nom)+'</a><span class="chip">'+esc(c.bord||'')+'</span></div>'+
      '<div class="cols"><div class="col"><p class="k">position affichée</p><p class="v"><em>'+esc(posTxt)+'</em></p>'+srcLink(posSrc)+'</div>'+
      '<div class="col"><p class="k">a voté ou fait</p><p class="v"><em>'+esc(actTxt)+'</em></p><span class="chip chip-fait">fait</span> '+srcLink(actSrc)+'</div></div></div>';
  }).join('');
  return topbar('theme')+'<p class="eyebrow">thème</p><h1>'+esc(themeLabel(cle))+'</h1>'+
    '<p class="lede">en 30 secondes : ce que chaque candidat propose pour 2027, mis en regard de ce qu\u0027il a réellement voté ou fait. tout est sourcé, rien n\u0027est commenté.</p>'+
    (cards||'<p class="lede">Aucun candidat pour l\u0027instant.</p>')+foot();
}
function renderCandidat(slug){
  var c=DATA.candidats.find(function(x){return x.slug===slug;});
  if(!c) return topbar('candidat')+'<h1>Candidat introuvable</h1>'+foot();
  var parcours=(c.parcours||[]).map(function(m){return '<tr><td>'+esc(m.periode)+'</td><td>'+esc(m.fonction)+'</td><td>'+esc(m.niveau)+'</td><td>'+srcLink(m.source)+'</td></tr>';}).join('');
  var positions=(c.positions||[]).map(function(p){
    return '<div class="card"><div class="card-head"><span class="name">'+esc(themeLabel(p.theme))+'</span></div>'+
      '<div class="cols"><div class="col"><p class="k">position affichée</p><p class="v"><em>'+esc(p.position?p.position.texte:'à documenter')+'</em></p>'+srcLink(p.position?p.position.source:'')+'</div>'+
      '<div class="col"><p class="k">a voté ou fait</p><p class="v"><em>'+esc(p.acte?p.acte.texte:'à documenter')+'</em></p><span class="chip chip-fait">fait</span> '+srcLink(p.acte?p.acte.source:'')+'</div></div></div>';
  }).join('') || '<p class="v" style="color:var(--faint)">Aucune position documentée pour l\u0027instant.</p>';
  var sources=(c.sources||[]).map(function(u){return '<li><a href="'+esc(u)+'">'+esc(u)+'</a></li>';}).join('');
  return topbar('candidat')+'<p class="eyebrow">candidat</p><h1>'+esc(c.nom)+'</h1>'+
    '<p class="lede">'+[esc(c.bord),esc(c.parti),'candidature '+esc(c.statut||'')].filter(Boolean).join(' \u00b7 ')+'</p>'+
    '<h2>parcours et niveaux de mandat</h2><table><thead><tr><th>période</th><th>fonction</th><th>niveau</th><th>source</th></tr></thead><tbody>'+parcours+'</tbody></table>'+
    '<p class="v" style="font-size:14px;color:var(--muted)">'+esc(c.ou_lire_le_bilan||'')+'</p>'+
    '<h2>positions par thème</h2>'+positions+'<h2>sources</h2><ul class="linklist">'+sources+'</ul>'+foot();
}
function renderMethode(){
  return topbar('methode')+'<p class="eyebrow">méthode</p><h1>Méthode et garde-fous</h1><div class="prose">'+
    '<h3>Hiérarchie des sources</h3><p>D\u0027abord les sources officielles : open data de l\u0027Assemblée, du Sénat et du Parlement européen, Journal officiel, HATVP, vie-publique.fr. Ensuite les agrégateurs neutres et documentés : NosDéputés.fr, NosSénateurs.fr, Datan.fr, l\u0027API CIVIX. La presse en dernier, et seulement pour dater un propos.</p>'+
    '<h3>Fait, contexte, interprétation</h3><p>Un fait est vérifiable et sourcé. Un contexte donne ce qu\u0027il faut pour le comprendre. Une interprétation, quand plusieurs lectures existent, les met côte à côte sans en choisir aucune.</p>'+
    '<h3>Symétrie</h3><p>Même grille et même profondeur pour tout le monde, aucun adjectif de valeur, et le bilan se lit toujours au bon niveau de mandat.</p>'+
    '<h3>Cadrage médiatique</h3><p>La propriété des médias est affichée, plusieurs titres d\u0027un même fait sont montrés, et on laisse juger. On n\u0027écrit jamais que tel média ment.</p>'+
    '<h3>Corrections</h3><p>Toute erreur signalée est corrigée, et la correction reste visible dans l\u0027historique du dépôt.</p></div>'+foot();
}
function renderComprendre(){
  return topbar('')+'<p class="eyebrow">comprendre</p><h1>Euro, ville, national : qui décide quoi</h1><div class="prose">'+
    '<p>Un candidat a rarement un seul bilan, mais un parcours réparti sur plusieurs niveaux. Chaque niveau donne des pouvoirs différents, donc on ne juge pas tout le monde avec la même règle.</p>'+
    '<h3>La commune</h3><p>Le quotidien concret : écoles, urbanisme, voirie. Pour une personnalité, un ancrage local et une preuve de gestion.</p>'+
    '<h3>Le département et la région</h3><p>Social, collèges et lycées, transports, développement économique. Une plateforme exécutive de poids.</p>'+
    '<h3>L\u0027Assemblée nationale</h3><p>On y vote la loi et le budget. C\u0027est le niveau où les votes se lisent le plus clairement, scrutin par scrutin.</p>'+
    '<h3>Le Sénat</h3><p>Co-écrit la loi, représente les territoires. Poids institutionnel et mandat long.</p>'+
    '<h3>Le gouvernement</h3><p>On y applique la loi, on ne la vote pas. Un ministre n\u0027a pas de relevé de votes : son bilan se lit sur les politiques menées.</p>'+
    '<h3>Le Parlement européen</h3><p>Une large part du droit appliqué en France y naît. Pour plusieurs personnalités, c\u0027est le principal mandat électif.</p>'+
    '<h3>Diriger un parti</h3><p>Aucun vote traçable : on juge sur les prises de position et les choix d\u0027appareil.</p>'+
    '<p>Chaque fiche lit donc le bilan là où il existe vraiment, au lieu d\u0027appliquer une règle unique.</p></div>'+foot();
}
function renderError(){
  return topbar('')+'<h1>Sans Raccourci</h1><p class="lede">Les données n\u0027ont pas pu être chargées. Deux causes possibles : le fichier candidats.json n\u0027est pas à la racine à côté de index.html, ou il contient une erreur de syntaxe JSON. Si tu ouvres la page en local, publie plutôt sur GitHub Pages.</p>'+foot();
}

function router(){
  if(!DATA.themes.length && !DATA.candidats.length){ document.getElementById('app').innerHTML=renderError(); return; }
  var h=location.hash.replace(/^#\/?/,''); var parts=h.split('/'); var out;
  if(parts[0]==='theme') out=renderTheme(parts[1]||'energie_climat');
  else if(parts[0]==='candidat') out=renderCandidat(parts[1]);
  else if(parts[0]==='methode') out=renderMethode();
  else if(parts[0]==='comprendre') out=renderComprendre();
  else out=renderHome();
  document.getElementById('app').innerHTML=out; window.scrollTo(0,0);
}
window.addEventListener('hashchange',router);

fetch('candidats.json',{cache:'no-store'})
  .then(function(r){return r.json();})
  .then(function(d){ DATA=d; router(); })
  .catch(function(){ document.getElementById('app').innerHTML=renderError(); });
</script>
</body>
</html>
