<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sans Raccourci</title>
<style>
:root{
  --bg:#ffffff; --surface:#ffffff; --surface-2:#f6f5f1;
  --text:#1c1c1a; --muted:#6b6a64; --faint:#94938c;
  --border:#e6e4dd; --accent:#3a5f8a; --maxw:760px;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#1a1a18; --surface:#232320; --surface-2:#2a2a26;
    --text:#ece9e1; --muted:#a3a199; --faint:#78766f; --border:#34342f; --accent:#8ab0da; }
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.65;-webkit-font-smoothing:antialiased}
.wrap{max-width:var(--maxw);margin:0 auto;padding:28px 20px 64px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.topbar{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:.5px solid var(--border);margin-bottom:28px}
.brand{font-weight:600;font-size:16px;color:var(--text)}
.nav{display:flex;gap:16px;font-size:14px}
.nav a{color:var(--muted)}
.nav a.active{color:var(--text);border-bottom:2px solid var(--border);padding-bottom:3px}
.eyebrow{font-size:12px;color:var(--faint);letter-spacing:.04em;margin:0 0 4px}
h1{font-size:24px;font-weight:600;margin:0 0 10px}
h2{font-size:18px;font-weight:600;margin:32px 0 12px}
.lede{font-size:15px;color:var(--muted);margin:0 0 28px}
p{margin:0 0 12px}
.chip{font-size:11px;background:var(--surface-2);color:var(--muted);padding:2px 9px;border-radius:20px;white-space:nowrap}
.chip-fait{background:rgba(58,95,138,.14);color:var(--accent)}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.card-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.card-head .name{font-weight:600;font-size:15px;color:var(--text)}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.col .k{font-size:11px;color:var(--faint);margin:0 0 3px}
.col .v{font-size:13px;color:var(--muted);margin:0 0 4px}
.src{font-size:12px}
table{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:8px}
td,th{text-align:left;padding:8px 10px;border-bottom:.5px solid var(--border);vertical-align:top}
th{font-size:12px;color:var(--faint);font-weight:500}
.foot{margin-top:28px;padding-top:14px;border-top:.5px solid var(--border);font-size:12px;color:var(--faint)}
.grid-links{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.linklist{list-style:none;padding:0;margin:0}
.linklist li{padding:8px 0;border-bottom:.5px solid var(--border);font-size:15px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.count{font-size:12px;color:var(--faint);margin:0 0 8px}
.prose p{font-size:14px;color:var(--muted)}
.prose h3{font-size:15px;margin:20px 0 6px}

.av{width:40px;height:40px;border-radius:50%;flex:0 0 40px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;background:var(--surface-2);color:var(--muted);object-fit:cover;overflow:hidden}
.av-lg{width:64px;height:64px;flex:0 0 64px;font-size:20px}
.idhead{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.credit{font-size:11px;color:var(--faint);margin:0 0 18px}
.linklist li .who{display:flex;align-items:center;gap:10px;min-width:0}
.av-sm{width:28px;height:28px;flex:0 0 28px;font-size:11px}







.hero{padding:6px 0 4px}
.hero h1{font-size:30px;line-height:1.2;margin:0 0 12px}
.hero .p{font-size:16px;color:var(--muted);line-height:1.65;margin:0 0 10px}
.hero .p b{color:var(--text);font-weight:600}
.doors{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:26px 0 8px}
.door{display:block;background:var(--surface);border:.5px solid var(--border);border-radius:14px;padding:16px 18px;text-decoration:none}
.door:hover{text-decoration:none;border-color:var(--accent)}
.door .t{font-weight:600;font-size:16px;color:var(--text);margin:0 0 6px}
.door .d{font-size:13px;color:var(--muted);line-height:1.55;margin:0 0 10px}
.door .n{font-size:12px;color:var(--accent)}
.door.wide{grid-column:1 / -1;background:var(--surface-2)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:24px 0 10px}
.stat2{background:var(--surface-2);border-radius:10px;padding:12px 10px;text-align:center}
.stat2 .v{font-size:22px;font-weight:600;color:var(--text);line-height:1.1}
.stat2 .l{font-size:11px;color:var(--faint);margin-top:4px;line-height:1.35}
.cd{display:flex;flex-direction:column;gap:3px;background:var(--surface-2);border-radius:10px;padding:14px 16px;margin:0 0 6px}
.cd .j{font-size:19px;font-weight:600;color:var(--text);margin:0 0 4px;line-height:1.3}
.cd .x{font-size:13px;font-weight:400;color:var(--muted);margin:0;font-family:Georgia,'Times New Roman',serif;font-style:italic}
.honest{font-size:12px;color:var(--faint);line-height:1.6;margin:14px 0 0}
@media(max-width:560px){.doors{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.hero h1{font-size:25px}}
.ccard{display:block;background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;text-decoration:none}
.ccard:hover{text-decoration:none;border-color:var(--accent)}
.ccard .ch{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.ccard .cn{font-weight:600;font-size:15px;color:var(--text)}
.ccard .cs{font-size:12px;color:var(--muted);margin:2px 0 0}
.ccard .mand{font-size:13px;color:var(--muted);margin:0 0 10px;line-height:1.55}
.ccard .meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding-top:10px;border-top:.5px solid var(--border)}
.ccard .pct{font-size:13px;color:var(--text);font-weight:600}
.ccard .pctl{font-size:11px;color:var(--faint)}
.ccard .tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.ccard .tags .chip{font-size:11px}

.sal{font-size:11px;color:var(--faint);white-space:nowrap}
.sal b{color:var(--accent);font-weight:600}
.secbadge{font-size:10px;background:var(--surface-2);color:var(--faint);padding:2px 8px;border-radius:20px;margin-left:6px}
.methodnote{font-size:12px;color:var(--muted);line-height:1.6;background:var(--surface-2);border-radius:10px;padding:12px 14px;margin:0 0 18px}
.methodnote b{color:var(--text)}
.tcard{display:block;background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;text-decoration:none}
.tcard:hover{text-decoration:none;border-color:var(--accent)}
.tcard .th{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:8px}
.tcard .tn{font-weight:600;font-size:15px;color:var(--text)}
.tcard .tc{font-size:12px;color:var(--faint);white-space:nowrap}
.tcard .tb{height:6px;border-radius:6px;background:var(--surface-2);overflow:hidden}
.tcard .tb i{display:block;height:100%;background:var(--accent);border-radius:6px}
.tcard .tw{font-size:12px;color:var(--muted);margin:8px 0 0;line-height:1.5}
.rank{font-size:12px;color:var(--faint);margin:0 0 16px}
.tsel{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 22px}
.tsel a{font-size:12px;padding:5px 11px;border-radius:20px;background:var(--surface-2);color:var(--muted);border:.5px solid transparent;text-decoration:none}
.tsel a:hover{text-decoration:none;color:var(--text)}
.tsel a.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.tsel a .n{opacity:.65;font-size:11px;margin-left:4px}



.nat-encours{background:var(--surface-2);color:var(--faint);border:1px dashed var(--border)}
.acte-date{font-size:11px;color:var(--faint);margin-left:2px}
details.todo{background:var(--surface-2);border:.5px dashed var(--border);border-radius:12px;margin-top:14px}
details.todo>summary{list-style:none;cursor:pointer;padding:12px 15px;font-size:13px;color:var(--muted)}
details.todo>summary::-webkit-details-marker{display:none}
details.todo .body{padding:0 15px 14px;font-size:13px;color:var(--muted);line-height:1.6}
details.todo .who2{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}

.ctx{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--surface-2);color:var(--muted);font-weight:600}
.ctx-date{font-size:11px;color:var(--faint);margin-left:2px}
.ctxou{font-size:11px;color:var(--faint);margin:4px 0 0;line-height:1.5}
.natl{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.02em}
.nat-vote{background:rgba(58,95,138,.16);color:var(--accent)}
.nat-action{background:rgba(176,132,46,.16);color:#a1752b}
.nat-absent{background:rgba(176,58,46,.14);color:#b03a2e}
.nat-aucun{background:var(--surface-2);color:var(--faint)}
.col .khead{display:flex;align-items:center;gap:6px;margin:0 0 5px;flex-wrap:wrap}
.natdef{font-size:11px;color:var(--faint);margin:4px 0 0;line-height:1.5}
.legende{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--faint);margin:0 0 16px;align-items:center}
.res{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 8px}
.res .kv{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--surface-2);color:var(--muted)}
.res .kv b{font-weight:600;color:var(--text)}
.res .kv.ok b{color:#2e7d50}.res .kv.no b{color:#b03a2e}.res .kv.wait b{color:#a1752b}
.quinq{font-size:12px;color:var(--muted);line-height:1.6;margin:8px 0 4px;padding:10px 12px;background:var(--surface-2);border-radius:8px}.quinq b{color:var(--text)}
.suite{font-size:12px;color:var(--muted);line-height:1.6;margin:8px 0 4px;padding-left:10px;border-left:2px solid var(--border)}
.suite b{color:var(--text)}
.eff{border-top:.5px solid var(--border);margin-top:12px;padding-top:12px}
.eff .k2{font-size:11px;color:var(--faint);margin:0 0 6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.eff .t{font-size:13px;color:var(--muted);margin:0 0 4px;line-height:1.6}
.chip-ok{background:rgba(46,125,80,.15);color:#2e7d50}
.chip-no{background:rgba(176,58,46,.15);color:#b03a2e}
.chip-na{background:var(--surface-2);color:var(--faint)}


.alt{border-top:.5px dashed var(--border);margin-top:10px;padding-top:10px}
.alt .h{font-size:11px;color:var(--faint);letter-spacing:.04em;text-transform:uppercase;margin:0 0 6px}
.alt .t{font-size:12px;color:var(--muted);line-height:1.6;margin:0 0 4px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--surface-2);color:var(--muted)}
.badge.wait{background:rgba(176,132,46,.16);color:#a1752b}

.synth{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:15px 17px;margin:0 0 22px}
.synth .lab2{font-size:11px;color:var(--faint);letter-spacing:.04em;text-transform:uppercase;margin:0 0 8px}
.synth .txt{font-size:14px;color:var(--muted);line-height:1.72;margin:0 0 12px}
.synth .cle{font-size:13px;color:var(--text);line-height:1.6;margin:0;padding:10px 12px;background:var(--bg-now,rgba(58,95,138,.09));border-radius:8px;border-left:2px solid var(--accent)}
.synth .cle b{font-weight:600}
.synthmini{font-size:12px;color:var(--muted);line-height:1.55;margin:8px 0 0;padding-top:8px;border-top:.5px solid var(--border)}
.assi{background:var(--surface-2);border-radius:10px;padding:12px 14px;margin:0 0 10px}
.assi .top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.assi .big{font-size:26px;font-weight:600;color:var(--text);line-height:1}
.assi .cmp{font-size:12px;color:var(--muted)}
.assi .b{height:6px;border-radius:6px;background:var(--border);overflow:hidden;margin:8px 0 6px;position:relative}
.assi .b i{display:block;height:100%;background:var(--accent);border-radius:6px}
.assi .b .avg{position:absolute;top:-3px;width:2px;height:12px;background:var(--text);opacity:.55}
.assi .d{font-size:12px;color:var(--muted);line-height:1.55;margin:0 0 4px}
.assi .na{font-size:13px;color:var(--muted);margin:0 0 4px;line-height:1.6}
.assi .lab{font-size:11px;color:var(--faint);letter-spacing:.04em;margin:0 0 8px;text-transform:uppercase}
.now{background:var(--bg-now,rgba(58,95,138,.09));border:1px solid var(--accent);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.now .lab{font-size:11px;color:var(--accent);letter-spacing:.05em;text-transform:uppercase;margin:0 0 8px;font-weight:600}
.now .m{font-size:14px;color:var(--text);margin:0 0 4px;line-height:1.6}
.now .m .per{color:var(--muted);font-size:12px}
.now .none{font-size:14px;color:var(--muted);margin:0}
.key{font-size:13px;color:var(--muted);background:var(--surface-2);border-radius:10px;padding:12px 14px;margin:0 0 26px;line-height:1.65}
.key b{color:var(--text);font-weight:600}
.past{margin-top:6px}
.past h2{margin-top:34px}
.past .hint{font-size:12px;color:var(--faint);margin:-4px 0 12px}


details.sec{background:var(--surface);border:.5px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
details.sec>summary{list-style:none;cursor:pointer;padding:14px 16px;display:flex;align-items:center;gap:10px}
details.sec>summary::-webkit-details-marker{display:none}
details.sec>summary .st{font-weight:600;font-size:14px;flex:1;color:var(--text)}
details.sec>summary .sc{font-size:11px;color:var(--faint)}
details.sec>summary .arr{font-size:11px;color:var(--faint);transition:transform .15s}
details.sec[open]>summary .arr{transform:rotate(90deg)}
details.sec[open]>summary{border-bottom:.5px solid var(--border)}
.secbody{padding:14px 16px}
.secbody>.card:last-child,.secbody>.assi,.secbody>.synth{margin-bottom:0}
.secbody .synth,.secbody .assi{background:transparent;border:none;padding:0}
details.stat{padding:0}
details.stat>summary{list-style:none;cursor:pointer;padding:13px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
details.stat>summary::-webkit-details-marker{display:none}
details.stat>summary .n{font-weight:600;font-size:15px;flex:1;min-width:120px}
details.stat>summary .arr{font-size:11px;color:var(--faint);transition:transform .15s}
details.stat[open]>summary .arr{transform:rotate(90deg)}
details.stat[open]>summary{border-bottom:.5px solid var(--border)}
.statbody{padding:4px 16px 14px}
.statbody .row:first-child{border-top:none}
.tabs{display:flex;gap:6px;margin:0 0 10px}
.tabs a{flex:1;text-align:center;font-size:13px;padding:9px 10px;border-radius:10px;background:var(--surface-2);color:var(--muted);text-decoration:none;border:.5px solid transparent}
.tabs a:hover{text-decoration:none;color:var(--text)}
.tabs a.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.tools{display:flex;justify-content:flex-end;margin:0 0 10px}
.tools button{font-size:12px;color:var(--muted);background:none;border:.5px solid var(--border);border-radius:20px;padding:4px 12px;cursor:pointer;font-family:inherit}
.stat{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.stat-h{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.stat-h .n{font-weight:600;font-size:15px}
.row{display:grid;grid-template-columns:120px 1fr;gap:10px;padding:6px 0;border-top:.5px solid var(--border);font-size:13px}
.row .l{color:var(--faint);font-size:11px;padding-top:2px}
.row .d{color:var(--muted)}
.dots{display:inline-flex;gap:3px;vertical-align:middle}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border)}
.dot.on{background:var(--accent)}
.legend{font-size:12px;color:var(--faint);margin:0 0 18px}
.smallnote{font-size:12px;color:var(--faint);border-top:.5px solid var(--border);padding-top:14px;margin-top:26px}
.smallnote p{font-size:12px;color:var(--faint);margin:0 0 6px}
@media(max-width:560px){.row{grid-template-columns:1fr;gap:2px}}
@media(max-width:560px){.cols,.grid-links{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
var DATA = { themes: [], candidats: [] };
var PHOTOS = {};

function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];});}
function srcLink(u){return u?'<a class="src" href="'+esc(u)+'">source</a>':'<span class="src" style="color:var(--faint)">source à ajouter</span>';}
function themeLabel(cle){var t=DATA.themes.find(function(x){return x.cle===cle;});return t?t.label:cle;}


function initials(nom){return (nom||'').split(/[ -]/).filter(Boolean).slice(0,2).map(function(w){return w[0].toUpperCase();}).join('');}
function photoDe(c){var p=(PHOTOS&&PHOTOS[c.slug])||null;return (p&&p.fichier)?p:null;}
function avatar(c,cls){
  var k=cls||'av', p=photoDe(c);
  if(p) return '<img class="av '+k+'" src="'+esc(p.fichier)+'" alt="Portrait de '+esc(c.nom)+'" loading="lazy" decoding="async">';
  return '<span class="av '+k+'" aria-hidden="true">'+esc(initials(c.nom))+'</span>';
}
function creditLine(c){
  var p=photoDe(c); if(!p) return '';
  var t='Photo : '+esc([p.auteur,p.licence].filter(Boolean).join(', ')||'crédit à compléter');
  return '<p class="credit">'+(p.source?'<a href="'+esc(p.source)+'">'+t+'</a>':t)+'</p>';
}


function dots(n){var o='';for(var i=1;i<=5;i++){o+='<span class="dot'+(i<=n?' on':'')+'"></span>';}return '<span class="dots" aria-label="influence '+n+' sur 5">'+o+'</span>';}

function statCard(o){
  var h='<details class="stat"><summary><span class="arr">\u25B8</span><span class="n">'+o.nom+'</span>'+
    (o.tag?'<span class="chip">'+o.tag+'</span>':'')+dots(o.poids)+'</summary><div class="statbody">';
  h+='<div class="row"><span class="l">ce que c\u0027est</span><span class="d">'+o.quoi+'</span></div>';
  h+='<div class="row"><span class="l">comment on l\u0027obtient</span><span class="d">'+o.comment+'</span></div>';
  h+='<div class="row"><span class="l">combien de temps</span><span class="d">'+o.duree+'</span></div>';
  h+='<div class="row"><span class="l">impact réel</span><span class="d">'+o.impact+'</span></div>';
  return h+'</div></details>';
}


function syntheseBlock(c){
  var s=c.synthese; if(!s) return '';
  return '<div class="synth"><p class="lab2">son positionnement sur le quinquennat 2022-2027</p>'+
    '<p class="txt">'+esc(s.texte)+'</p>'+
    (s.cle?'<p class="cle"><b>En un mot.</b> '+esc(s.cle)+'</p>':'')+'</div>';
}

function assiBlock(c){
  var a=c.assiduite; if(!a) return '';
  var h='<div class="assi"><p class="lab">assiduité aux votes</p>';
  if(a.taux!=null){
    h+='<div class="top"><span class="big">'+a.taux+'%</span><span class="cmp">moyenne comparable : '+a.moyenne+'%</span></div>';
    h+='<div class="b"><i style="width:'+a.taux+'%"></i><span class="avg" style="left:'+a.moyenne+'%"></span></div>';
    h+='<p class="d">'+esc(a.base||'')+'</p>';
    if(a.loyaute) h+='<p class="d">'+esc(a.loyaute)+'</p>';
    if(a.note) h+='<p class="d">'+esc(a.note)+'</p>';
  } else if(a.type==='a_extraire'){
    h+='<p class="na"><span class="badge wait">donnée à extraire</span></p><p class="d">'+esc(a.note||'')+'</p>';
  } else {
    h+='<p class="na"><span class="badge">ne produit pas de votes</span></p><p class="d">'+esc(a.note||'')+'</p>';
  }
  h+=srcLink(a.source);
  if(a.autrement){
    h+='<div class="alt"><p class="h">'+esc(a.autrement.titre||'Engagement mesuré autrement')+'</p>'+
       '<p class="t">'+esc(a.autrement.texte||'')+'</p>'+srcLink(a.autrement.source)+'</div>';
  }
  return h+'</div>';
}


function natInfo(a){
  var n=(a&&a.nature)||'';
  if(n==='vote')   return {c:'nat-vote',   t:'a voté',        d:'Scrutin nominatif : sa voix est enregistrée et vérifiable.'};
  if(n==='action') return {c:'nat-action', t:'a fait',        d:'Acte exercé sans vote : décision de gouvernement, de collectivité ou de parti.'};
  if(n==='absent') return {c:'nat-absent', t:'absent au vote',d:'Le scrutin a eu lieu, il ou elle n\u0027y a pas pris part.'};
  if(n==='aucun')  return {c:'nat-aucun',  t:'n\u0027a pas pu voter', d:'Aucun mandat permettant de voter ce texte.'};
  return {c:'nat-encours', t:'recherche en cours', d:'Nous n\u0027avons pas encore retrouvé de scrutin sourcé sur ce thème. Rien n\u0027est affirmé tant que ce n\u0027est pas le cas.'};
}

function posHead(pos){
  var c=pos&&pos.contexte;
  if(!c) return '<p class="k">position affichée</p>';
  return '<p class="k">position affichée</p><div class="khead"><span class="ctx">'+esc(c.type)+'</span>'+
    (c.date?'<span class="ctx-date">'+esc(c.date)+'</span>':'')+'</div>';
}
function posFoot(pos){
  var c=pos&&pos.contexte;
  return (c&&c.ou)?'<p class="ctxou">'+esc(c.ou)+'</p>':'';
}

function acteLabel(a){
  return (a&&a.nature==='a_documenter') ? 'acte non encore documenté' : 'dernier acte documenté';
}
function acteHead(a){
  var i=natInfo(a);
  var dt=(a&&a.date)?'<span class="acte-date">'+esc(a.date)+'</span>':'';
  return '<div class="khead"><span class="natl '+i.c+'">'+i.t+'</span>'+dt+'</div>';
}

function legendeNat(){
  return '<div class="legende"><span class="natl nat-vote">a voté</span> scrutin nominatif'+
    '<span class="natl nat-action">a fait</span> acte sans vote'+
    '<span class="natl nat-absent">absent</span> n\u0027a pas pris part'+
    '<span class="natl nat-aucun">n\u0027a pas pu voter</span> pas de mandat'+'</div>';
}

function effBlock(p){
  if(!p.effet) return '';
  var e=p.effet;
  var r=(e.resultat||'').toLowerCase(), rc='';
  if(/^adopt|appliqu|mené|porté/.test(r)) rc='ok';
  else if(/^rejet/.test(r)) rc='no';
  else if(/en cours|documenter/.test(r)) rc='wait';
  var a=(e.alignement||'').toLowerCase(), ac='';
  if(/avec la majorité|a porté|négociateur/.test(a)) ac='ok';
  else if(/contre le résultat|minorité|absent/.test(a)) ac='no';
  var l=(e.loi||'').toLowerCase(), lc='';
  if(/promulgu|en vigueur|adopt/.test(l)) lc='ok';
  if(/non contraignante/.test(l)) lc='wait';
  if(/sans objet|aucun texte/.test(l)) lc='';
  if(/en cours|documenter/.test(l)) lc='wait';

  var h='<div class="eff"><p class="k2">concrètement, ça donne quoi</p><div class="res">';
  if(e.resultat) h+='<span class="kv '+rc+'">issue du vote : <b>'+esc(e.resultat)+'</b></span>';
  if(e.alignement) h+='<span class="kv '+ac+'">sa position : <b>'+esc(e.alignement)+'</b></span>';
  h+='</div>';
  if(e.loi||e.voie){
    h+='<div class="res">';
    if(e.loi) h+='<span class="kv '+lc+'">le texte aujourd\u0027hui : <b>'+esc(e.loi)+'</b></span>';
    if(e.voie) h+='<span class="kv">voie d\u0027adoption : <b>'+esc(e.voie)+'</b></span>';
    h+='</div>';
  }
  if(e.texte) h+='<p class="t">'+esc(e.texte)+'</p>';
  if(e.suite) h+='<p class="suite"><b>Et après ?</b> '+esc(e.suite)+'</p>';
  if(e.quinquennat) h+='<p class="quinq"><b>Dans le quinquennat qui s\u0027achève.</b> '+esc(e.quinquennat)+'</p>';
  return h+srcLink(e.source)+'</div>';
}

function themeSelector(actif){
  return '<div class="tsel">'+DATA.themes.map(function(t){
    var n=DATA.candidats.filter(function(c){return (c.positions||[]).some(function(p){return p.theme===t.cle;});}).length;
    return '<a class="'+(t.cle===actif?'on':'')+'" href="#/theme/'+t.cle+'">'+esc(t.label)+'<span class="n">'+n+'</span></a>';
  }).join('')+'</div>';
}

  return '<div class="topbar"><a class="brand" href="#/">sans raccourci</a><nav class="nav">'+
    a('theme','par thème','#/themes')+a('candidat','par candidat','#/candidats')+a('statuts','les statuts','#/statuts')+'</nav></div>';
}
function foot(){return '<div class="foot">pas de commentaires, pas de likes, pas de compteurs. chaque ligne renvoie à sa source. versionné sur GitHub.</div>';}

function nomTri(n){var i=(n||'').indexOf(' ');return (i<0?n:n.slice(i+1)).toLocaleLowerCase('fr');}
function parOrdre(list){return (list||[]).slice().sort(function(a,b){
  return nomTri(a.nom).localeCompare(nomTri(b.nom),'fr',{sensitivity:'base'});});}
function mandatsActuels(c){return (c.parcours||[]).filter(function(m){return /depuis|en cours/i.test(m.periode||'');});}

function renderCandidats(){
  var cards=parOrdre(DATA.candidats).map(function(c){
    var act=mandatsActuels(c);
    var mand=act.length? act.map(function(m){return esc(m.fonction.split('.')[0]);}).join(' \u00b7 ')
                       : 'Aucun mandat en cours identifié.';
    var a=c.assiduite;
    var part = a && a.taux!=null
      ? '<span class="pct">'+a.taux+'%</span><span class="pctl">participation aux votes, moyenne '+a.moyenne+'%</span>'
      : '<span class="badge'+(a&&a.type==='a_extraire'?' wait':'')+'">'+(a&&a.type==='a_extraire'?'donnée à extraire':'ne produit pas de votes')+'</span><span class="pctl">engagement mesuré autrement, voir la fiche</span>';
    var th=(c.positions||[]).map(function(p){return '<span class="chip">'+esc(themeLabel(p.theme))+'</span>';}).join('');
    return '<a class="ccard" href="#/candidat/'+esc(c.slug)+'">'+
      '<div class="ch">'+avatar(c,'av')+'<div><div class="cn">'+esc(c.nom)+'</div>'+
      '<p class="cs">'+[esc(c.bord),esc(c.parti)].filter(Boolean).join(' \u00b7 ')+'</p></div></div>'+
      '<p class="mand">'+mand+'</p>'+
      '<div class="meta">'+part+'</div>'+
      (th?'<div class="tags">'+th+'</div>':'')+
      (c.synthese&&c.synthese.cle?'<p class="synthmini">'+esc(c.synthese.cle)+'</p>':'')+
      '</a>';
  }).join('');
  return topbar('candidat')+'<p class="eyebrow">candidats</p><h1>Qui sont les candidats, et où ils en sont</h1>'+
    '<p class="lede">Classés par ordre alphabétique, sans hiérarchie. Pour chacun : son mandat en cours, son assiduité aux votes quand elle existe, et les sujets déjà documentés sur sa fiche.</p>'+
    cards+
    '<p class="rank">L\u0027assiduité n\u0027est comparable qu\u0027entre personnes exerçant le même type de mandat. Un ministre ou un responsable de parti ne vote pas : l\u0027absence de taux n\u0027est pas un mauvais score.</p>'+
    foot();
}

function renderThemes(){
  var tot=DATA.candidats.length||1;
  var rows=DATA.themes.map(function(t){
    var fiches=DATA.candidats.filter(function(c){return (c.positions||[]).some(function(p){return p.theme===t.cle;});});
    return {t:t,n:fiches.length,noms:fiches.map(function(c){return c.nom;})};
  });
  var principaux=rows.filter(function(r){return !r.t.secondaire;});
  var secondaires=rows.filter(function(r){return r.t.secondaire;});

  function carte(r){
    var pct=Math.round(r.n/tot*100);
    var w=r.n? r.noms.slice(0,3).join(', ')+(r.noms.length>3?' et '+(r.noms.length-3)+' autre(s)':'')
             : 'Aucune fiche documentée pour l\u0027instant.';
    var sal=r.t.salience
      ? '<span class="sal"><b>'+r.t.salience+' %</b> des Français</span>'
      : '<span class="sal">non mesuré</span>';
    return '<a class="tcard" href="#/theme/'+r.t.cle+'">'+
      '<div class="th"><span class="tn">'+esc(r.t.label)+(r.t.secondaire?'<span class="secbadge">transversal</span>':'')+'</span>'+sal+'</div>'+
      '<div class="tb"><i style="width:'+pct+'%"></i></div>'+
      '<p class="tw">'+r.n+' / '+tot+' fiches documentées \u00b7 '+esc(w)+'</p></a>';
  }

  return topbar('theme')+'<p class="eyebrow">thèmes</p><h1>Les sujets, classés par ce qui préoccupe vraiment les Français</h1>'+
    '<p class="lede">Chaque thème compare tous les candidats sur un même sujet : leur position affichée, ce qu\u0027ils ont réellement voté ou fait, et ce que ça a produit.</p>'+
    '<div class="methodnote"><b>Comment ce classement est établi.</b> L\u0027ordre suit les préoccupations réelles des Français, mesurées par le baromètre Ipsos de juin 2026, et non notre avancement ni notre jugement. Le pourcentage indique la part de personnes citant ce sujet parmi leurs principales inquiétudes. La barre, elle, montre où en est notre documentation. <a href="https://www.ipsos.com/fr-fr/ce-qui-preoccupe-les-francais">source</a></div>'+
    principaux.map(carte).join('')+
    (secondaires.length?'<h2>Pour comprendre le reste</h2>'+
      '<p class="rank">Ce thème n\u0027apparaît pas dans les préoccupations mesurées. Il est conservé parce qu\u0027il explique pourquoi les autres aboutissent ou échouent : censure, 49.3, dissolution, majorité introuvable.</p>'+
      secondaires.map(carte).join(''):'')+
    foot();
}

function renderTheme(cle){
  var tous=parOrdre(DATA.candidats);
  var avec=tous.filter(function(c){return (c.positions||[]).some(function(x){return x.theme===cle;});});
  var sans=tous.filter(function(c){return !(c.positions||[]).some(function(x){return x.theme===cle;});});

  var cards=avec.map(function(c){
    var p=(c.positions||[]).find(function(x){return x.theme===cle;});
    return '<div class="card"><div class="card-head">'+avatar(c,'av')+'<a class="name" href="#/candidat/'+esc(c.slug)+'">'+esc(c.nom)+'</a><span class="chip">'+esc(c.bord||'')+'</span></div>'+
      '<div class="cols"><div class="col">'+posHead(p.position)+'<p class="v"><em>'+esc(p.position?p.position.texte:'')+'</em></p>'+srcLink(p.position?p.position.source:'')+posFoot(p.position)+'</div>'+
      '<div class="col"><p class="k">dernier acte documenté'+((p.acte&&p.acte.date)?' <span class="ctx-date">'+esc(p.acte.date)+'</span>':'')+'</p><p class="v"><em>'+esc(p.acte?p.acte.texte:'')+'</em></p>'+srcLink(p.acte?p.acte.source:'')+'</div></div>'+effBlock(p)+'</div>';
  }).join('');

  var reste = sans.length
    ? '<details class="todo"><summary>'+sans.length+' fiche(s) pas encore documentée(s) sur ce thème</summary><div class="body">'+
      'Ces candidats n\u0027apparaissent pas ci-dessus parce que nous n\u0027avons pas encore retrouvé d\u0027acte sourcé sur ce sujet. Une absence ici ne dit rien de leur position : elle indique seulement où en est notre travail.'+
      '<div class="who2">'+sans.map(function(c){return '<a class="chip" href="#/candidat/'+esc(c.slug)+'">'+esc(c.nom)+'</a>';}).join('')+'</div></div></details>'
    : '';

  return topbar('theme')+'<p class="eyebrow"><a href="#/themes">tous les thèmes</a></p><h1>'+esc(themeLabel(cle))+'</h1>'+themeSelector(cle)+
    '<p class="lede">en 30 secondes : ce que chaque candidat propose pour 2027, mis en regard de son dernier acte documenté sur ce sujet, et de ce que cet acte a produit.</p>'+
    '<div class="methodnote"><b>Une précision de méthode.</b> Pour rendre la comparaison possible, nous partons souvent d\u0027un même texte pour tout le monde. Ce texte n\u0027est pas forcément celui sur lequel chaque candidat s\u0027investit le plus : il sert de point de mesure commun, pas d\u0027indicateur de priorité.</div>'+
    (cards||'<p class="lede">Aucune fiche documentée sur ce thème pour l\u0027instant.</p>')+reste+foot();
}

function bloc(titre,compte,contenu,ouvert){
  return '<details class="sec"'+(ouvert?' open':'')+'><summary><span class="arr">\u25B8</span>'+
    '<span class="st">'+titre+'</span>'+(compte?'<span class="sc">'+compte+'</span>':'')+
    '</summary><div class="secbody">'+contenu+'</div></details>';
}

function renderCandidat(slug){
  var c=DATA.candidats.find(function(x){return x.slug===slug;});
  if(!c) return topbar('candidat')+'<h1>Candidat introuvable</h1>'+foot();

  var tous=(c.parcours||[]);
  var actuels=mandatsActuels(c);
  var passes=tous.filter(function(m){return !/depuis|en cours/i.test(m.periode||'');});

  var now='<div class="now"><p class="lab">aujourd\u0027hui</p>';
  now+= actuels.length
    ? actuels.map(function(m){return '<p class="m">'+esc(m.fonction)+' <span class="per">'+esc(m.periode)+' \u00b7 '+esc(m.niveau)+'</span> '+srcLink(m.source)+'</p>';}).join('')
    : '<p class="none">Aucun mandat en cours identifié dans les sources.</p>';
  now+='</div>';

  var positions=(c.positions||[]).map(function(p){
    return '<div class="card"><div class="card-head"><span class="name">'+esc(themeLabel(p.theme))+'</span></div>'+
      '<div class="cols"><div class="col">'+posHead(p.position)+'<p class="v"><em>'+esc(p.position?p.position.texte:'')+'</em></p>'+srcLink(p.position?p.position.source:'')+posFoot(p.position)+'</div>'+
      '<div class="col"><p class="k">'+acteLabel(p.acte)+'</p>'+acteHead(p.acte)+'<p class="v"><em>'+esc(p.acte?p.acte.texte:'')+'</em></p>'+srcLink(p.acte?p.acte.source:'')+'<p class="natdef">'+natInfo(p.acte).d+'</p></div></div>'+effBlock(p)+'</div>';
  }).join('') || '<p class="v" style="color:var(--faint)">Aucune position documentée pour l\u0027instant.</p>';

  var lignes=passes.map(function(m){
    return '<tr><td>'+esc(m.periode)+'</td><td>'+esc(m.fonction)+'</td><td>'+esc(m.niveau)+'</td><td>'+srcLink(m.source)+'</td></tr>';
  }).join('');
  var parcours=lignes
    ? '<table><thead><tr><th>période</th><th>fonction</th><th>niveau</th><th>source</th></tr></thead><tbody>'+lignes+'</tbody></table>'
    : '<p class="v" style="color:var(--faint)">Aucun mandat antérieur documenté.</p>';

  var sources='<ul class="linklist">'+(c.sources||[]).map(function(u){return '<li><a href="'+esc(u)+'">'+esc(u)+'</a></li>';}).join('')+'</ul>';

  var a=c.assiduite;
  var resume = a&&a.taux!=null ? a.taux+'% de participation'
             : (a&&a.type==='a_extraire' ? 'donnée à extraire' : 'ne produit pas de votes');

  return topbar('candidat')+'<p class="eyebrow"><a href="#/candidats">tous les candidats</a></p>'+
    '<div class="idhead">'+avatar(c,'av-lg')+'<h1 style="margin:0">'+esc(c.nom)+'</h1></div>'+
    '<p class="lede" style="margin-bottom:6px">'+[esc(c.bord),esc(c.parti),'candidature '+esc(c.statut||'')].filter(Boolean).join(' \u00b7 ')+'</p>'+creditLine(c)+
    now+
    '<div class="tools"><button type="button" onclick="toggleSecs(this)">tout déplier</button></div>'+
    bloc('Où lire son bilan','', '<p class="key" style="margin:0">'+esc(c.ou_lire_le_bilan||'')+'</p>')+
    bloc('Assiduité aux votes', resume, assiBlock(c))+
    bloc('Son positionnement 2022-2027','', syntheseBlock(c))+
    bloc('Positions et votes par thème', (c.positions||[]).length+' thèmes', positions, true)+
    bloc('Parcours antérieur', passes.length+' mandats', parcours)+
    bloc('Sources', (c.sources||[]).length+' liens', sources)+
    foot();
}

function toggleSecs(btn){
  var o=document.querySelectorAll('details.sec');
  var t=[].some.call(o,function(d){return !d.open;});
  [].forEach.call(o,function(d){d.open=t;});
  btn.textContent = t ? 'tout replier' : 'tout déplier';
}

function toggleStats(btn){
  var o=document.querySelectorAll('details.stat');
  var t=[].some.call(o,function(d){return !d.open;});
  [].forEach.call(o,function(d){d.open=t;});
  btn.textContent = t ? 'tout replier' : 'tout déplier';
}

function renderStatuts(famille){
  var S=statutsData();
  var note='<div class="smallnote"><p>Comment nous rédigeons : sources officielles d\u0027abord (Assemblée, Sénat, Parlement européen, Journal officiel, HATVP, Conseil constitutionnel), puis agrégateurs neutres (NosDéputés.fr, Datan.fr), la presse en dernier et seulement pour dater un propos. Fait, contexte et interprétation sont distingués. Même grille et même profondeur pour tous, sans adjectif de valeur. Toute erreur signalée est corrigée et la correction reste visible dans l\u0027historique du dépôt.</p></div>';

  if(famille==='adoption'){
    var tabsA='<div class="tabs">'+
      '<a href="#/statuts/candidature">candidature</a>'+
      '<a href="#/statuts/mandat">mandat</a>'+
      '<a class="on" href="#/statuts/adoption">adoption</a></div>';
    return topbar('statuts')+'<p class="eyebrow"><a href="#/statuts">les statuts</a></p>'+
      '<h1>Comment un texte devient la loi, ou pas</h1>'+tabsA+
      '<p class="legend">Un vote ne dit pas tout. Selon la voie empruntée, le texte peut être promulgué, vidé de sa substance, abandonné, ou adopté sans que personne ne vote. Touchez une voie pour la déplier.</p>'+
      '<div class="tools"><button type="button" onclick="toggleStats(this)">tout déplier</button></div>'+
      voiesData().map(statCard).join('')+note+foot();
  }
  if(famille!=='candidature' && famille!=='mandat'){
    return topbar('statuts')+'<p class="eyebrow">les statuts</p><h1>Une candidature n\u0027est pas un mandat</h1>'+
      '<p class="lede">Chaque statut a son mode d\u0027accès, sa durée et son poids réel. C\u0027est la clé pour lire un bilan sans se tromper de règle. Choisissez ce que vous voulez comprendre.</p>'+
      '<div class="doors">'+
        '<a class="door" href="#/statuts/candidature"><p class="t">Statuts de candidature</p>'+
          '<p class="d">Pressentie, déclarée, en primaire, officielle. Tant que le Conseil constitutionnel n\u0027a pas publié la liste, aucune candidature n\u0027existe en droit.</p>'+
          '<span class="n">'+S.candidature.length+' statuts</span></a>'+
        '<a class="door" href="#/statuts/mandat"><p class="t">Statuts de mandat</p>'+
          '<p class="d">Maire, député, sénateur, ministre, eurodéputé. C\u0027est ici que se lit un bilan, encore faut-il le lire au bon endroit.</p>'+
          '<span class="n">'+S.mandat.length+' statuts</span></a>'+
        '<a class="door wide" href="#/statuts/adoption"><p class="t">Comment un texte devient la loi, ou pas</p>'+
          '<p class="d">Vote ordinaire, 49.3, ordonnances, résolution, commission mixte paritaire, décret. Voter, c\u0027est une chose ; savoir si le texte a été promulgué, amendé, abandonné ou passé en force en est une autre. Ces six voies expliquent l\u0027écart.</p>'+
          '<span class="n">6 voies comparées</span></a>'+
      '</div>'+note+foot();
  }

  var liste=S[famille];
  var tabs='<div class="tabs">'+
    '<a class="'+(famille==='candidature'?'on':'')+'" href="#/statuts/candidature">candidature</a>'+
    '<a class="'+(famille==='mandat'?'on':'')+'" href="#/statuts/mandat">mandat</a>'+
    '<a href="#/statuts/adoption">adoption</a></div>';

  return topbar('statuts')+'<p class="eyebrow"><a href="#/statuts">les statuts</a></p>'+

    liste.map(statCard).join('')+note+foot();

function renderComprendre(){
  return topbar('')+'<p class="eyebrow">comprendre</p><h1>Qui est élu comment, pour combien de temps, et pour décider quoi</h1><div class="prose">'+
    '<p>Un candidat a rarement un seul bilan, mais un parcours réparti sur plusieurs niveaux. Chaque niveau a son mode d\u0027élection, sa durée, son rythme de renouvellement et son champ de décision. C\u0027est pour cela qu\u0027on ne juge pas tout le monde avec la même règle.</p>'+

    '<h3>La commune</h3>'+
    '<p><b>Comment on est élu.</b> Les électeurs élisent les conseillers municipaux au scrutin de liste paritaire à deux tours. Depuis une loi du 21 mai 2025, ce scrutin de liste s\u0027applique aussi aux communes de moins de 1 000 habitants, soit 71 % des communes françaises. Le maire n\u0027est pas élu directement par les habitants : c\u0027est le conseil municipal qui le désigne lors de sa première réunion.</p>'+
    '<p><b>Durée et rythme.</b> Six ans. Les dernières municipales se sont tenues les 15 et 22 mars 2026, avec plus de 48 millions d\u0027électeurs appelés aux urnes.</p>'+
    '<p><b>Ce qui s\u0027y décide.</b> Le quotidien le plus concret : écoles primaires, urbanisme et permis de construire, voirie, propreté, police municipale, crèches, action sociale de proximité.</p>'+
    '<p><b>Portée nationale.</b> Faible en droit, forte en politique. Le scrutin sert de test grandeur nature du poids des partis avant la présidentielle, et une mairie reste le tremplin classique vers la scène nationale.</p>'+

    '<h3>Le département</h3>'+
    '<p><b>Comment on est élu.</b> Au scrutin binominal majoritaire à deux tours : dans chaque canton, les électeurs élisent un binôme composé d\u0027une femme et d\u0027un homme, ce qui garantit la parité. Le président du conseil départemental est ensuite élu par les conseillers.</p>'+
    '<p><b>Durée et rythme.</b> Six ans, avec renouvellement intégral.</p>'+
    '<p><b>Ce qui s\u0027y décide.</b> Surtout le social : RSA, protection de l\u0027enfance, personnes âgées et handicap. Plus les collèges et les routes départementales.</p>'+
    '<p><b>Portée nationale.</b> Limitée en visibilité, mais le département exécute sur le terrain une grande partie des politiques sociales décidées à Paris.</p>'+

    '<h3>La région</h3>'+
    '<p><b>Comment on est élu.</b> Au scrutin de liste proportionnel à deux tours, avec une prime majoritaire de 25 % des sièges à la liste arrivée en tête, ce qui assure une majorité stable. Le président de région est élu par les conseillers régionaux.</p>'+
    '<p><b>Durée et rythme.</b> Six ans.</p>'+
    '<p><b>Ce qui s\u0027y décide.</b> Lycées, transports régionaux, formation professionnelle, développement économique, aménagement du territoire.</p>'+
    '<p><b>Portée nationale.</b> Réelle. Présider une région, c\u0027est piloter un gros budget et une administration entière : c\u0027est la preuve de capacité de gestion la plus solide en dehors d\u0027un ministère.</p>'+

    '<h3>L\u0027Assemblée nationale</h3>'+
    '<p><b>Comment on est élu.</b> 577 députés élus au scrutin uninominal majoritaire à deux tours, un par circonscription. Chaque député représente un territoire précis, pas une liste nationale.</p>'+
    '<p><b>Durée et rythme.</b> Cinq ans en principe, mais c\u0027est le seul mandat que le président de la République peut interrompre : une dissolution provoque des législatives anticipées, ce qui explique que le calendrier réel soit souvent décalé.</p>'+
    '<p><b>Ce qui s\u0027y décide.</b> Le vote de la loi et du budget, le contrôle du gouvernement, et le pouvoir de le renverser par une motion de censure.</p>'+
    '<p><b>Portée nationale.</b> Maximale, et c\u0027est surtout le niveau le plus transparent : chaque scrutin public est nominatif, donc on sait exactement qui a voté quoi, et quel jour.</p>'+

    '<h3>Le Sénat</h3>'+
    '<p><b>Comment on est élu.</b> Au suffrage indirect : ce ne sont pas les citoyens qui votent, mais un collège de grands électeurs composé très majoritairement de délégués des conseils municipaux. C\u0027est pourquoi les municipales déterminent en grande partie la couleur du Sénat. Scrutin majoritaire dans les départements peu peuplés, proportionnel dans les autres.</p>'+
    '<p><b>Durée et rythme.</b> Six ans, avec renouvellement par moitié tous les trois ans, ce qui donne au Sénat une inertie voulue. Le prochain scrutin des grands électeurs est fixé au 27 septembre 2026.</p>'+
    '<p><b>Ce qui s\u0027y décide.</b> 348 sénateurs co-écrivent la loi avec l\u0027Assemblée dans la navette parlementaire, représentent les collectivités et contrôlent le gouvernement. En cas de désaccord persistant, l\u0027Assemblée a le dernier mot.</p>'+
    '<p><b>Portée nationale.</b> Le Sénat ne peut pas renverser le gouvernement et ne peut pas être dissous. Son influence est celle d\u0027un frein et d\u0027un correcteur, pas d\u0027un moteur.</p>'+

    '<h3>Le gouvernement</h3>'+
    '<p><b>Comment on y arrive.</b> On n\u0027y est pas élu. Le Premier ministre est nommé par le président de la République, et les ministres sont nommés sur proposition du Premier ministre. Le gouvernement est responsable devant l\u0027Assemblée, qui peut le renverser.</p>'+
    '<p><b>Durée et rythme.</b> Aucune durée fixe : un ministre reste en poste tant qu\u0027il est maintenu, parfois quelques mois.</p>'+
    '<p><b>Ce qui s\u0027y décide.</b> On n\u0027y vote pas la loi, on la prépare et on l\u0027applique : réformes portées, décrets, gestion des administrations et des budgets.</p>'+
    '<p><b>Nuance décisive pour lire un bilan.</b> Un ministre n\u0027a aucun relevé de votes. Son bilan se lit sur les politiques menées et leurs résultats. Lui reprocher de ne pas avoir voté serait un contresens.</p>'+

    '<h3>Le Parlement européen</h3>'+
    '<p><b>Comment on est élu.</b> Au scrutin de liste proportionnel, dans une circonscription nationale unique depuis 2019, avec un seuil de 5 % pour obtenir des sièges. On vote pour une liste, pas pour une personne de son territoire.</p>'+
    '<p><b>Durée et rythme.</b> Cinq ans, à date fixe. Les dernières européennes ont eu lieu en juin 2024.</p>'+
    '<p><b>Ce qui s\u0027y décide.</b> 720 eurodéputés, dont 81 Français, votent une large part du droit qui s\u0027applique ensuite en France : marché unique, climat, numérique, agriculture, commerce, budget de l\u0027Union.</p>'+
    '<p><b>Portée nationale.</b> Sous-estimée. Beaucoup de règles vécues comme nationales sont d\u0027origine européenne, et pour plusieurs candidats à 2027 c\u0027est le mandat où se trouve l\u0027essentiel de leur relevé de votes.</p>'+

    '<h3>Diriger un parti</h3>'+
    '<p><b>Comment on y arrive.</b> Par une élection interne, réservée aux adhérents, selon des règles propres à chaque formation. Ce n\u0027est pas un mandat public.</p>'+
    '<p><b>Ce que ça donne.</b> Aucun vote traçable, mais le contrôle de la ligne, des alliances et surtout de l\u0027investiture. On juge alors sur les prises de position publiques et les choix d\u0027appareil.</p>'+

    '<h3>Ce que ça change ici</h3>'+
    '<p>Chaque fiche commence par le parcours, puis lit le bilan là où il existe vraiment : votes nominatifs pour un député, votes de liste européens pour un eurodéputé, politiques menées pour un ministre, gestion pour un maire ou un président de région. C\u0027est la seule façon de comparer des gens comparables.</p>'+
    '</div>'+foot();
}

function renderError(){
  return topbar('')+'<h1>Sans Raccourci</h1><p class="lede">Les données n\u0027ont pas pu être chargées. Deux causes possibles : le fichier candidats.json n\u0027est pas à la racine à côté de index.html, ou il contient une erreur de syntaxe JSON. Si vous ouvrez la page en local, publiez plutôt sur GitHub Pages.</p>'+foot();
}

function router(){
  if(!DATA.themes.length && !DATA.candidats.length){ document.getElementById('app').innerHTML=renderError(); return; }
  var h=location.hash.replace(/^#\/?/,''); var parts=h.split('/'); var out;
  if(parts[0]==='themes') out=renderThemes();
  else if(parts[0]==='theme') out=renderTheme(parts[1]||'energie_climat');
  else if(parts[0]==='candidats') out=renderCandidats();
  else if(parts[0]==='candidat') out=renderCandidat(parts[1]);
  else if(parts[0]==='statuts'||parts[0]==='methode') out=renderStatuts(parts[1]);
  else if(parts[0]==='comprendre') out=renderComprendre();
  else out=renderHome();
  document.getElementById('app').innerHTML=out; window.scrollTo(0,0);
}
window.addEventListener('hashchange',router);

Promise.all([
  fetch('candidats.json',{cache:'no-store'}).then(function(r){return r.json();}),
  fetch('photos.json',{cache:'no-store'}).then(function(r){return r.json();}).catch(function(){return null;})
]).then(function(res){
  DATA=res[0];
  PHOTOS=(res[1]&&res[1].photos)||{};
  router();
}).catch(function(){ document.getElementById('app').innerHTML=renderError(); });
</script>
